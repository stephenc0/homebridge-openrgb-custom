<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  html, body {
    background: transparent;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    padding: 16px;
    color: var(--text-colour, #212529);
  }
  .field { margin-bottom: 12px; }
  label { display: block; font-weight: 500; margin-bottom: 4px; font-size: 13px; }
  input[type=text], input[type=number] {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--border-colour, #ced4da);
    border-radius: 4px;
    background: var(--input-background-colour, #fff);
    color: var(--text-colour, #212529);
    font-size: 14px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-colour, #dee2e6);
  }
  .server-card {
    border: 1px solid var(--border-colour, #dee2e6);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .server-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .server-title { font-weight: 600; font-size: 15px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .device-card {
    border: 1px solid var(--border-colour, #dee2e6);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 8px;
    background: var(--modal-background-colour, transparent);
  }
  .device-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .device-name { font-weight: 500; font-size: 13px; }
  .device-location { font-size: 11px; color: var(--text-muted-colour, #6c757d); margin-top: 1px; }
  .wb-row {
    display: grid;
    grid-template-columns: 36px 1fr 36px;
    align-items: center;
    gap: 8px;
  }
  .wb-label { font-size: 11px; color: var(--text-muted-colour, #6c757d); }
  .wb-label.cool { color: #6aa3f5; }
  .wb-label.warm { color: #f5a623; text-align: right; }
  input[type=range] { width: 100%; cursor: pointer; accent-color: var(--primary-colour, #007bff); }
  .wb-value {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted-colour, #6c757d);
    margin-top: 3px;
  }
  .zone-toggle {
    font-size: 12px;
    color: var(--primary-colour, #007bff);
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px 0 0;
    display: block;
    text-align: center;
    width: 100%;
  }
  .zone-grid {
    margin-top: 8px;
    border-top: 1px solid var(--border-colour, #dee2e6);
    padding-top: 8px;
  }
  .zone-row { margin-bottom: 10px; }
  .zone-label {
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 3px;
    display: flex;
    justify-content: space-between;
  }
  .zone-leds { font-size: 11px; color: var(--text-muted-colour, #6c757d); font-weight: normal; }
  .btn {
    padding: 5px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  .btn-primary { background: var(--primary-colour, #007bff); color: #fff; }
  .btn-danger { background: #dc3545; color: #fff; padding: 2px 8px; font-size: 12px; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--primary-colour, #007bff);
    color: var(--primary-colour, #007bff);
  }
  .btn:disabled { opacity: 0.55; cursor: default; }
  .section-title { font-weight: 600; margin: 16px 0 8px; font-size: 14px; }
  .discover-row { display: flex; align-items: center; gap: 10px; margin: 10px 0 8px; }
  .discover-status { font-size: 12px; color: var(--text-muted-colour, #6c757d); }
  .no-devices { font-size: 13px; color: var(--text-muted-colour, #6c757d); padding: 4px 0 8px; }
  .identify-btn {
    font-size: 12px;
    padding: 2px 8px;
    background: transparent;
    border: 1px solid var(--border-colour, #ced4da);
    border-radius: 4px;
    color: var(--text-colour, #212529);
    cursor: pointer;
  }
  .identify-btn:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(async () => {
  const configs = await homebridge.getPluginConfig();
  const cfg = Object.assign(
    { name: 'OpenRGB Custom', servers: [], discoveryInterval: 60, preserveDisconnected: false, suppressConnectionErrors: false },
    configs[0] || {}
  );
  if (!cfg.servers) cfg.servers = [];

  const app = document.getElementById('app');

  /* ---- auto-push config on changes ---- */
  let pushTimer;
  function pushConfig() {
    clearTimeout(pushTimer);
    pushTimer = setTimeout(() => homebridge.updatePluginConfig([cfg]), 500);
  }

  /* ---- helpers ---- */
  function el(tag, props, ...children) {
    const e = document.createElement(tag);
    for (const [k, v] of Object.entries(props || {})) {
      if (k === 'style' && typeof v === 'string') e.style.cssText = v;
      else if (k.startsWith('on')) e[k] = v;
      else if (k in e) e[k] = v;
      else e.setAttribute(k, v);
    }
    for (const c of children) {
      if (c == null) continue;
      e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
    return e;
  }

  function field(labelText, value, type, onChange) {
    const input = el('input', { type, value: value ?? '' });
    input.oninput = () => { onChange(input.value); pushConfig(); };
    return el('div', { className: 'field' }, el('label', {}, labelText), input);
  }

  function toggle(labelText, checked, onChange) {
    const cb = el('input', { type: 'checkbox', checked: !!checked, style: 'width:auto' });
    cb.onchange = () => { onChange(cb.checked); pushConfig(); };
    return el('div', { className: 'toggle-row' }, el('span', {}, labelText), cb);
  }

  function wbLabel(value) {
    if (value < 100) return 'Cool';
    if (value > 156) return 'Warm';
    return 'Neutral';
  }

  /* ---- device list ---- */
  function makeWbSlider(value, onChange) {
    const valLabel = el('div', { className: 'wb-value' }, wbLabel(value));
    const slider = el('input', { type: 'range', min: 0, max: 255, step: 1, value });
    slider.oninput = () => { onChange(parseInt(slider.value)); valLabel.textContent = wbLabel(parseInt(slider.value)); pushConfig(); };
    return el('div', {},
      el('div', { className: 'wb-row' },
        el('span', { className: 'wb-label cool' }, '❄ Cool'),
        slider,
        el('span', { className: 'wb-label warm' }, 'Warm ☀')
      ),
      valLabel
    );
  }

  function makeIdentifyBtn(server, dc) {
    const btn = el('button', { className: 'identify-btn' }, '💡 Identify');
    btn.onclick = async () => {
      btn.disabled = true;
      btn.textContent = '…';
      try {
        await homebridge.request('/identify', {
          host: server.host, port: server.port, name: server.name,
          deviceName: dc.name, location: dc.location,
        });
      } catch (e) {
        homebridge.toast.error(e.message, 'Identify failed');
      }
      btn.disabled = false;
      btn.textContent = '💡 Identify';
    };
    return btn;
  }

  function renderDevices(server, container) {
    container.innerHTML = '';
    if (!server.deviceConfigs || !server.deviceConfigs.length) {
      container.appendChild(el('div', { className: 'no-devices' }, 'No devices — click Discover to load from server.'));
      return;
    }
    server.deviceConfigs.forEach((dc, di) => {
      if (!dc.ledWhiteBalance) dc.ledWhiteBalance = [];

      const nameEl = el('div', { className: 'device-name' }, dc.name);
      const headerLeft = el('div', {}, nameEl);
      if (dc.location) headerLeft.appendChild(el('div', { className: 'device-location' }, dc.location));

      // Device-level slider
      const deviceSlider = makeWbSlider(dc.whiteBalance ?? 128, v => dc.whiteBalance = v);

      // Per-zone section (hidden by default)
      const zones = dc.zones ?? [];
      if (!dc.zoneWhiteBalance) dc.zoneWhiteBalance = {};
      const zoneGrid = el('div', { className: 'zone-grid', style: 'display:none' });

      function renderZoneGrid() {
        zoneGrid.innerHTML = '';
        if (!zones.length) {
          zoneGrid.appendChild(el('div', { style: 'font-size:12px;color:var(--text-muted-colour,#6c757d)' }, 'No zones — re-discover to load zone info.'));
          return;
        }
        for (const zone of zones) {
          const zoneWb = dc.zoneWhiteBalance[zone.name] ?? 128;
          const valLabel = el('div', { className: 'wb-value' }, wbLabel(zoneWb));
          const slider = el('input', { type: 'range', min: 0, max: 255, step: 1, value: zoneWb });
          slider.oninput = () => {
            dc.zoneWhiteBalance[zone.name] = parseInt(slider.value);
            valLabel.textContent = wbLabel(parseInt(slider.value));
            pushConfig();
          };
          zoneGrid.appendChild(el('div', { className: 'zone-row' },
            el('div', { className: 'zone-label' },
              el('span', {}, zone.name),
              el('span', { className: 'zone-leds' }, `${zone.ledCount} LEDs`)
            ),
            el('div', { className: 'wb-row' },
              el('span', { className: 'wb-label cool' }, '❄'),
              slider,
              el('span', { className: 'wb-label warm' }, '☀')
            ),
            valLabel
          ));
        }
      }
      renderZoneGrid();

      let zoneOpen = false;
      const zoneLabel = zones.length ? `▼ Zone overrides (${zones.length} zones)` : '▼ Zone overrides (discover to load)';
      const toggleBtn = el('button', { className: 'zone-toggle', onclick: () => {
        zoneOpen = !zoneOpen;
        zoneGrid.style.display = zoneOpen ? 'block' : 'none';
        toggleBtn.textContent = zoneOpen
          ? (zones.length ? '▲ Hide zone overrides' : '▲ Hide zone overrides')
          : zoneLabel;
      }}, zoneLabel);

      const card = el('div', { className: 'device-card' },
        el('div', { className: 'device-header' },
          headerLeft,
          el('div', { style: 'display:flex;gap:6px;align-items:center' },
            makeIdentifyBtn(server, dc),
            el('button', { className: 'btn btn-danger', onclick: () => {
              server.deviceConfigs.splice(di, 1);
              renderDevices(server, container);
            }}, '✕')
          )
        ),
        deviceSlider,
        toggleBtn,
        zoneGrid
      );
      container.appendChild(card);
    });
  }

  /* ---- server card ---- */
  function renderServer(server, si) {
    if (!server.deviceConfigs) server.deviceConfigs = [];
    const titleEl = el('span', { className: 'server-title' }, server.name || 'Server');
    const devicesDiv = el('div');

    const discoverStatus = el('span', { className: 'discover-status' });
    const discoverBtn = el('button', { className: 'btn btn-outline', onclick: async () => {
      discoverBtn.disabled = true;
      discoverStatus.textContent = 'Connecting…';
      try {
        const result = await homebridge.request('/discover', { host: server.host, port: server.port, name: server.name });

        // Count names to detect duplicates
        const nameCounts = {};
        for (const d of result.devices) nameCounts[d.name] = (nameCounts[d.name] || 0) + 1;

        let added = 0;
        for (const d of result.devices) {
          const alreadyExists = server.deviceConfigs.find(dc =>
            dc.name === d.name && (dc.location === undefined || dc.location === d.location)
          );
          if (alreadyExists) {
            alreadyExists.zones = d.zones; // refresh zone info
          } else {
            const entry = { name: d.name, whiteBalance: 128, zones: d.zones, zoneWhiteBalance: {} };
            if (nameCounts[d.name] > 1) entry.location = d.location;
            server.deviceConfigs.push(entry);
            added++;
          }
        }
        discoverStatus.textContent = `${result.devices.length} device(s) found${added ? `, ${added} new` : ', none new'}.`;
        renderDevices(server, devicesDiv);
      } catch (e) {
        discoverStatus.textContent = `Failed: ${e.message}`;
      }
      discoverBtn.disabled = false;
    }}, 'Discover Devices');

    const hostInput = el('input', { type: 'text', value: server.host ?? '' });
    hostInput.oninput = () => server.host = hostInput.value;
    const nameInput = el('input', { type: 'text', value: server.name ?? '' });
    nameInput.oninput = () => { server.name = nameInput.value; titleEl.textContent = nameInput.value; };
    const portInput = el('input', { type: 'number', value: server.port ?? 6742 });
    portInput.oninput = () => server.port = parseInt(portInput.value);

    const card = el('div', { className: 'server-card' },
      el('div', { className: 'server-header' },
        titleEl,
        el('button', { className: 'btn btn-danger', onclick: () => { cfg.servers.splice(si, 1); render(); }}, 'Remove')
      ),
      el('div', { className: 'row-2' },
        el('div', { className: 'field' }, el('label', {}, 'Name'), nameInput),
        el('div', { className: 'field' }, el('label', {}, 'Host'), hostInput)
      ),
      el('div', { className: 'field' }, el('label', {}, 'Port'), portInput),
      el('div', { className: 'discover-row' }, discoverBtn, discoverStatus),
      devicesDiv
    );

    renderDevices(server, devicesDiv);
    app.appendChild(card);
  }

  /* ---- render ---- */
  function render() {
    app.innerHTML = '';
    app.appendChild(field('Plugin Name', cfg.name, 'text', v => cfg.name = v));
    app.appendChild(field('Discovery Interval (seconds)', cfg.discoveryInterval, 'number', v => cfg.discoveryInterval = parseInt(v)));
    app.appendChild(toggle('Preserve Disconnected Devices', cfg.preserveDisconnected, v => cfg.preserveDisconnected = v));
    app.appendChild(toggle('Suppress Connection Errors', cfg.suppressConnectionErrors, v => cfg.suppressConnectionErrors = v));

    app.appendChild(el('div', { className: 'section-title' }, 'Servers'));
    cfg.servers.forEach((s, i) => renderServer(s, i));
    app.appendChild(el('button', { className: 'btn btn-outline', onclick: () => {
      cfg.servers.push({ name: 'My Computer', host: 'localhost', port: 6742, deviceConfigs: [] });
      pushConfig();
      render();
    }}, '+ Add Server'));
  }

  render();
})();
</script>
</body>
</html>
